version: '3.8'
services:
  gemma4-local:
    image: ollama/ollama:latest
    container_name: gemma4_ai
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: always
    environment:
      - OLLAMA_HOST=0.0.0.0

  # This service automatically pulls the gemma model when the container starts
  gemma-puller:
    image: curlimages/curl:latest
    depends_on:
      - gemma4-local
    command: >
      sh -c "sleep 10 && curl -X POST http://gemma4-local:11434/api/pull -d '{\"name\": \"gemma\"}'"
